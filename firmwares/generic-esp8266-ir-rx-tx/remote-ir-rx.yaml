########################
# Device Setup
########################

substitutions:
  device_id: remote-ir-rx
  device_name: Remote IR RX

esphome:
  name: "${device_id}"
  friendly_name: "${device_name}"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

########################
# Software Stack Setup
########################

# Enable logging
logger:

# Enable Home Assistant API
api:
  #encryption:
  #  key: !secret api_encryption
  password: !secret api_password

  #actions:
  #  - action: code_send
  #    variables:
  #      code_str: string
  #    then:
  #      - remote_transmitter.transmit_pronto:
  #          data: !lambda 'return code_str;'

ota:
  - platform: esphome
    password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: ${device_name} Hotspot
    password: !secret wifi_fallback_password

captive_portal:

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"

sensor:

  # Extra sensor to keep track of plug uptime
  - platform: uptime
    name: "Uptime"
    filters:
      - lambda: return x / 3600;
    unit_of_measurement: "h"
    accuracy_decimals: 2

  # Extra sensor for WiFi signal
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

########################
# Hardware Setup
########################

# Enable module status LED
status_led:
  pin:
    number: GPIO2
    inverted: true

# IR RX
remote_receiver:
  pin:
    number: GPIO27
    inverted: true
    mode:
      input: true
      pullup: true

  # Change this when you identify the protocol
  dump: all

  # Sensible defaults to remove noise
  tolerance: 35%
  filter: 200us
  idle: 4ms

  # Publish the last received pronto message
  on_pronto:
    then:
      - homeassistant.event:
          event: esphome.remote_ir_rx_pronto
          data:
            pronto: !lambda 'return x.data;'
