########################
# Device Setup
########################

substitutions:
  device_id: remote-living-fireplace
  device_name: Remote Living Fireplace

esphome:
  name: "${device_id}"
  friendly_name: "${device_name}"

esp8266:
  board: esp12e

########################
# Software Stack Setup
########################

# Enable logging
logger:

# Enable Home Assistant API
api:
  #encryption:
  #  key: !secret api_encryption
  password: !secret api_password

  actions:
    - action: transmit_nec
      variables:
        address: string
        command: string
      then:
        - remote_transmitter.transmit_nec:
            address: !lambda |-
              return (uint16_t) strtoul(address.c_str(), nullptr, 0);
            command: !lambda |-
              return (uint16_t) strtoul(command.c_str(), nullptr, 0);

ota:
  - platform: esphome
    password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: ${device_name} Hotspot
    password: !secret wifi_fallback_password

captive_portal:

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"

sensor:

  # Extra sensor to keep track of plug uptime
  - platform: uptime
    name: "Uptime"
    filters:
      - lambda: return x / 3600;
    unit_of_measurement: "h"
    accuracy_decimals: 2

  # Extra sensor for WiFi signal
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

########################
# Hardware Setup
########################

# Enable module status LED
status_led:
  pin:
    number: GPIO2
    inverted: true

# IR TX
remote_transmitter:
  pin: GPIO4
  carrier_duty_percent: 33%

# IR RX
switch:
  - platform: template
    name: "IR Receiver Enabled"
    id: ir_rx_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

remote_receiver:
  pin:
    number: GPIO14
    inverted: true
    mode:
      input: true
      pullup: true

  dump:
    - nec

  # Sensible defaults to remove noise
  tolerance: 50%
  filter: 300us
  idle: 20ms
  buffer_size: 2kB

  # Report address and command back to Home Assistant
  on_nec:
    then:
      - if:
          condition:
            switch.is_on: ir_rx_enabled
          then:
            - homeassistant.event:
                event: esphome.ir_rx_nec
                data:
                  address: !lambda |-
                    char buf[16];
                    snprintf(buf, sizeof(buf), "0x%04X", (unsigned int)x.address);
                    return std::string(buf);
                  command: !lambda |-
                    char buf[16];
                    snprintf(buf, sizeof(buf), "0x%04X", (unsigned int)x.command);
                    return std::string(buf);

########################
# Remote Setup
########################

button:
  - platform: template
    name: "Power"
    on_press:
      - remote_transmitter.transmit_nec:
          address: 0xF708
          command: 0xEE11

  - platform: template
    name: "Color A"
    on_press:
      - remote_transmitter.transmit_nec:
          address: 0xF708
          command: 0xF20D

  - platform: template
    name: "Color B"
    on_press:
      - remote_transmitter.transmit_nec:
          address: 0xF708
          command: 0xF10E

  - platform: template
    name: "Dimmer"
    on_press:
      - remote_transmitter.transmit_nec:
          address: 0xF708
          command: 0xED12

  - platform: template
    name: "Speed"
    on_press:
      - remote_transmitter.transmit_nec:
          address: 0xF708
          command: 0xEA15

  - platform: template
    name: "Timer"
    on_press:
      - remote_transmitter.transmit_nec:
          address: 0xF708
          command: 0xEC13

  - platform: template
    name: "Heat"
    on_press:
      - remote_transmitter.transmit_nec:
          address: 0xF708
          command: 0xEB14
