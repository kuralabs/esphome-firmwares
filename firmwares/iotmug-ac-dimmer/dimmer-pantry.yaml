########################
# Device Setup
########################

substitutions:
  device_id: dimmer-pantry
  device_name: Dimmer Pantry

esphome:
  name: "${device_id}"
  friendly_name: "${device_name}"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

########################
# Software Stack Setup
########################

# Enable logging
logger:

# Enable Home Assistant API
api:
  #encryption:
  #  key: !secret api_encryption
  password: !secret api_password

ota:
  - platform: esphome
    password: ""

wifi:
  # Workaround for bug https://github.com/esphome/issues/issues/4893
  # Ubiquiti + C3 :/
  output_power: 8.5
  power_save_mode: none
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: ${device_name} Hotspot
    password: !secret wifi_fallback_password

captive_portal:

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"

sensor:

  # Extra sensor to keep track of plug uptime
  - platform: uptime
    name: "Uptime"
    filters:
      - lambda: return x / 3600;
    unit_of_measurement: "h"
    accuracy_decimals: 2

  # Extra sensor for WiFi signal
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

########################
# Hardware Setup
########################

output:
  - platform: ledc
    pin: GPIO03
    id: output_pwm
    frequency: "1220Hz"  # 1220Hz, 2441Hz, 4882Hz

light:
  - platform: monochromatic
    output: output_pwm
    name: "Light"
    id: light_dimmer
    default_transition_length: 2s
    # gamma_correct: 1.0              # optional, makes brightness linear

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO5
      mode:
        input: true
        pullup: true
    name: "Door Sensor"
    id: sensor_door
    device_class: door
    filters:
      - delayed_on: 100ms   # debounce to prevent flicker
      - delayed_off: 100ms

  - platform: gpio
    pin:
      number: GPIO6
      mode:
        input: true
        pullup: true
    name: "Override Sensor"
    id: sensor_override
    filters:
      - invert:
      - delayed_on: 100ms   # debounce to prevent flicker
      - delayed_off: 100ms
