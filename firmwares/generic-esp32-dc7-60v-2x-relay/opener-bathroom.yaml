########################
# Device Setup
########################

substitutions:
  device_id: opener-bathroom
  device_name: Opener Bathroom

esphome:
  name: "${device_id}"
  friendly_name: "${device_name}"
  on_boot:
    then:
      - cover.close: cover_window

esp32:
  board: nodemcu-32s
  framework:
    type: arduino

########################
# Software Stack Setup
########################

# Enable logging
logger:

# Enable Home Assistant API
api:
  #encryption:
  #  key: !secret api_encryption
  password: !secret api_password

ota:
  - platform: esphome
    password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: ${device_name} Hotspot
    password: !secret wifi_fallback_password

captive_portal:

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"

########################
# Hardware Setup
########################

status_led:
  pin:
    number: GPIO23
    inverted: true

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true

sensor:
  - platform: aht10
    variant: AHT20
    id: sensor_climate
    temperature:
      name: "Temperature"
      id: sensor_temperature
    humidity:
      name: "Humidity"
      id: sensor_humidity

  # Extra sensor to keep track of plug uptime
  - platform: uptime
    name: "Uptime"
    filters:
      - lambda: return x / 3600;
    unit_of_measurement: "h"
    accuracy_decimals: 2

  # Extra sensor for WiFi signal
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: True
    name: "Button"
    on_press:
      then:
        - button.press: button_toggle_cover

switch:
  - platform: gpio
    pin: GPIO16
    id: relay_open
    name: "Relay Open"
    restore_mode: ALWAYS_OFF
    internal: true

  - platform: gpio
    pin: GPIO17
    id: relay_close
    name: "Relay Close"
    restore_mode: ALWAYS_OFF
    internal: true

cover:
  - platform: time_based
    name: "Cover Window"
    id: cover_window
    open_action:
      - switch.turn_off: relay_close
      - switch.turn_on: relay_open
    open_duration: 23s

    close_action:
      - switch.turn_off: relay_open
      - switch.turn_on: relay_close
    close_duration: 23s

    stop_action:
      - switch.turn_off: relay_open
      - switch.turn_off: relay_close

button:
  - platform: template
    id: button_toggle_cover
    name: "Toggle Cover"
    on_press:
      then:
        - lambda: |-
            if (id(cover_window).is_fully_open()) {
              id(cover_window).make_call().set_command_close().perform();
            } else if (id(cover_window).is_fully_closed()) {
              id(cover_window).make_call().set_command_open().perform();
            } else {
              id(cover_window).make_call().set_command_stop().perform();
            }
