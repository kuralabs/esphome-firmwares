########################
# Device Setup
########################

substitutions:
  device_id: plug-a
  device_name: Plug A

esphome:
  name: "${device_id}"
  friendly_name: "${device_name}"

  platformio_options:
    board_build.mcu: esp32c3
    board_build.variant: esp32c3

esp32:
  variant: esp32c3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_BLE_50_FEATURES_SUPPORTED: y
      CONFIG_BT_BLE_42_FEATURES_SUPPORTED: y
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "10"

########################
# Software Stack Setup
########################

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption

# Enable Over-The-Air Updates
ota:
  - platform: esphome
    password: !secret ota_password

# Enable WiFi
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: ${device_name} Hotspot
    password: !secret wifi_fallback_password

captive_portal:

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"

sensor:
  # Extra sensor to keep track of plug uptime
  - platform: uptime
    name: "Uptime"
    filters:
      - lambda: return x / 3600;
    unit_of_measurement: "h"
    accuracy_decimals: 2

  # Extra sensor for WiFi signal
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

########################
# Hardware Setup
########################

status_led:
  pin:
    number: GPIO6
    inverted: true

binary_sensor:
  - platform: gpio
    id: id_reset
    pin:
      number: GPIO9
      mode:
        input: true
        pullup: true
      inverted: true
    on_press:
      then:
        - switch.toggle: id_relay

switch:
  - platform: gpio
    name: "Relay"
    id: id_relay
    pin:
      number: GPIO4
    restore_mode: ALWAYS_OFF

# If Bluetooth tracker is needed:
esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 1100ms
    window: 1100ms

bluetooth_proxy:
  active: true
